<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JATAYU — BattleGround Core V2 (Phoenix · Maha Meru · Deep Space)</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#020208; height:100%; }
  canvas { display:block; touch-action:none; cursor:grab; }
  canvas:active { cursor:grabbing; }
  #hud {
    position:fixed; top:24px; left:50%; transform:translateX(-50%);
    font-family:'Courier New', monospace; color:#FFD98A; letter-spacing:6px;
    font-size:15px; text-transform:uppercase; opacity:0.9; text-align:center;
    pointer-events:none;
  }
  #hud .sub { font-size:10px; opacity:0.6; margin-top:5px; letter-spacing:3px; }
  #controls {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; font-family:'Courier New', monospace;
  }
  #controls button {
    background:rgba(255,215,138,0.04); border:1px solid rgba(255,215,138,0.3);
    color:#e8d5a8; font-size:11px; letter-spacing:2px; text-transform:uppercase;
    padding:8px 14px; cursor:pointer; border-radius:2px; transition:all 0.2s ease;
  }
  #controls button:hover { background:rgba(255,215,138,0.14); }
  #controls button.active { border-color:#FFD98A; color:#FFD98A; box-shadow:0 0 14px rgba(255,217,138,.25); }
  #note {
    position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
    font-family:'Courier New', monospace; font-size:10px; color:#6b5c3a; letter-spacing:1px;
    pointer-events:none;
  }
</style>
</head>
<body>
<div id="hud">JATAYU<div class="sub" id="stateLabel">ADVANCED AGI — IDLE</div></div>
<div id="note">drag to orbit · scroll to zoom</div>
<div id="controls">
  <button data-state="idle" class="active">Idle</button>
  <button data-state="listening">Listening</button>
  <button data-state="thinking">Thinking</button>
  <button data-state="speaking">Speaking</button>
  <button data-state="alert">Alert</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   SCENE
============================================================ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020208);
scene.fog = new THREE.FogExp2(0x020208, 0.004);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 400);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.22));
const keyLight = new THREE.PointLight(0xffe2b0, 1.6, 80);
keyLight.position.set(8, 10, 12);
scene.add(keyLight);
const coreLight = new THREE.PointLight(0xffc860, 2.2, 30); // glow from the orb itself
scene.add(coreLight);

/* ============================================================
   STATES
============================================================ */
const STATES = {
  idle:      { color:0xF5C76A, rot:0.0015, swirl:1.0, wing:1.0,  flap:0.35, pulse:0, label:'ADVANCED AGI — IDLE' },
  listening: { color:0x9FDCFF, rot:0.0035, swirl:1.3, wing:1.12, flap:0.6,  pulse:0, label:'ADVANCED AGI — LISTENING' },
  thinking:  { color:0xFFA93D, rot:0.012,  swirl:3.4, wing:1.05, flap:1.2,  pulse:0, label:'ADVANCED AGI — THINKING' },
  speaking:  { color:0xFFE7A8, rot:0.006,  swirl:2.0, wing:1.1,  flap:0.8,  pulse:1, label:'ADVANCED AGI — SPEAKING' },
  alert:     { color:0xE14B4B, rot:0.0004, swirl:0.4, wing:0.92, flap:0.15, pulse:0, label:'ADVANCED AGI — ALERT' },
};
let target = STATES.idle;
const current = { color:new THREE.Color(target.color), rot:target.rot, swirl:target.swirl, wing:target.wing, flap:target.flap };

/* ============================================================
   SOFT SPRITE TEXTURE (shared by glow, nebula, embers)
============================================================ */
function softTexture(inner=0.9, mid=0.25){
  const c = document.createElement('canvas'); c.width=c.height=128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,`rgba(255,255,255,${inner})`);
  g.addColorStop(0.4,`rgba(255,255,255,${mid})`);
  g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g; x.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const softTex = softTexture();

/* ============================================================
   DEEP SPACE — stars, galaxy band, nebulae
============================================================ */
// -- multicolored star shells --
{
  const n = 5000;
  const pos = new Float32Array(n*3), col = new Float32Array(n*3), sz = new Float32Array(n);
  const palette = [new THREE.Color(0xffffff), new THREE.Color(0xcfe4ff), new THREE.Color(0xffe6c0), new THREE.Color(0xffc9a0)];
  for (let i=0;i<n;i++){
    // spherical shell so stars surround the camera at every angle
    const r = 60 + Math.random()*120;
    const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    pos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1] = r*Math.cos(ph);
    pos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
    const c = palette[(Math.random()*palette.length)|0];
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
    sz[i] = Math.random()*1.6+0.3;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({ size:0.45, map:softTex, vertexColors:true, transparent:true, opacity:0.9, depthWrite:false, blending:THREE.AdditiveBlending });
  scene.add(new THREE.Points(geo, mat));
}

// -- spiral galaxy sweeping behind the emblem --
const galaxy = (() => {
  const n = 9000, arms = 3;
  const pos = new Float32Array(n*3), col = new Float32Array(n*3);
  const inner = new THREE.Color(0xffd9a0), outer = new THREE.Color(0x7a6bff);
  for (let i=0;i<n;i++){
    const t = Math.random();
    const radius = Math.pow(t, 0.6) * 55;
    const armAngle = ((i%arms)/arms) * Math.PI*2;
    const spin = radius * 0.12;
    const spread = (Math.random()-0.5) * (1.5 + radius*0.14);
    const a = armAngle + spin + spread*0.12;
    pos[i*3]   = Math.cos(a)*radius + (Math.random()-0.5)*2;
    pos[i*3+1] = (Math.random()-0.5) * (2.4 - t*1.6);
    pos[i*3+2] = Math.sin(a)*radius + (Math.random()-0.5)*2;
    const c = inner.clone().lerp(outer, t);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({ size:0.35, map:softTex, vertexColors:true, transparent:true, opacity:0.5, depthWrite:false, blending:THREE.AdditiveBlending });
  const pts = new THREE.Points(geo, mat);
  pts.position.set(-20, 14, -90);
  pts.rotation.set(1.15, 0.2, 0.5);
  scene.add(pts);
  return pts;
})();

// -- nebula clouds: big soft additive sprites in violet / teal / amber --
const nebulaGroup = new THREE.Group();
{
  const colors = [0x5b2d8f, 0x1f4d6e, 0x8f4d1f, 0x3a1f6e, 0x145a52];
  for (let i=0;i<70;i++){
    const mat = new THREE.SpriteMaterial({
      map:softTexture(0.16, 0.05), color: colors[(Math.random()*colors.length)|0],
      transparent:true, opacity:0.22+Math.random()*0.15,
      depthWrite:false, blending:THREE.AdditiveBlending
    });
    const s = new THREE.Sprite(mat);
    const r = 55 + Math.random()*70;
    const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    s.position.set(r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph)*0.6, r*Math.sin(ph)*Math.sin(th));
    const sc = 20+Math.random()*38;
    s.scale.set(sc, sc, 1);
    nebulaGroup.add(s);
  }
  scene.add(nebulaGroup);
}

/* ============================================================
   CORE GROUP
============================================================ */
const coreGroup = new THREE.Group();
scene.add(coreGroup);
const lineMat = new THREE.LineBasicMaterial({ color: current.color, transparent:true, opacity:0.9 });

function circlePts(r, seg=72){
  const pts=[]; for (let i=0;i<=seg;i++){ const a=(i/seg)*Math.PI*2; pts.push(new THREE.Vector3(r*Math.cos(a), r*Math.sin(a), 0)); } return pts;
}
function addLineTo(group, points, closed=false, mat=lineMat){
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const line = closed ? new THREE.LineLoop(geo, mat) : new THREE.Line(geo, mat);
  group.add(line); return line;
}

/* ============================================================
   MAHA MERU — the Shri Yantra raised into true 3D
   Each triangle tier sits at its own depth, forming the sacred
   mountain (Meru) silhouette front AND back of the orb plane.
============================================================ */
const yantra = new THREE.Group();
coreGroup.add(yantra);

function trianglePts(h, upward){
  const pts = upward
    ? [[0,h],[-h*0.866,-h*0.5],[h*0.866,-h*0.5]]
    : [[0,-h],[-h*0.866,h*0.5],[h*0.866,h*0.5]];
  pts.push(pts[0]);
  return pts.map(p => new THREE.Vector3(p[0], p[1], 0));
}
// Shiva tiers (upward) stepping toward the viewer, Shakti tiers (downward) stepping away —
// union of the two lattices around the singularity, Meru-fashion.
[[1.55,0.0],[1.25,0.28],[0.95,0.56],[0.65,0.84]].forEach(([h,z],i)=>{
  const t = addLineTo(yantra, trianglePts(h,true));
  t.position.z = z;
  t.material = new THREE.LineBasicMaterial({ color: current.color, transparent:true, opacity:0.9 - i*0.12 });
});
[[1.4,0.0],[1.1,-0.28],[0.8,-0.56],[0.5,-0.84]].forEach(([h,z],i)=>{
  const t = addLineTo(yantra, trianglePts(h,false));
  t.position.z = z;
  t.material = new THREE.LineBasicMaterial({ color: current.color, transparent:true, opacity:0.9 - i*0.12 });
});
// bindu marker ring at the deepest point of each side
addLineTo(yantra, circlePts(0.18)).position.z = 1.0;
addLineTo(yantra, circlePts(0.18)).position.z = -1.0;

// boundary circle
addLineTo(yantra, circlePts(1.7), true);

// ashta-dala (8) and shodasha-dala (16) lotus petal rings — petals get real 3D lift
function petalRing(count, innerR, outerR, tilt){
  const g = new THREE.Group();
  for (let i=0;i<count;i++){
    const a = (i/count)*Math.PI*2;
    const half = (Math.PI/count)*0.42;
    const petal = addLineTo(g, [
      new THREE.Vector3(innerR*Math.cos(a-half), innerR*Math.sin(a-half), 0),
      new THREE.Vector3((innerR+(outerR-innerR)*0.55)*Math.cos(a-half*0.4), (innerR+(outerR-innerR)*0.55)*Math.sin(a-half*0.4), tilt),
      new THREE.Vector3(outerR*Math.cos(a), outerR*Math.sin(a), tilt*1.6),
      new THREE.Vector3((innerR+(outerR-innerR)*0.55)*Math.cos(a+half*0.4), (innerR+(outerR-innerR)*0.55)*Math.sin(a+half*0.4), tilt),
      new THREE.Vector3(innerR*Math.cos(a+half), innerR*Math.sin(a+half), 0),
    ]);
  }
  yantra.add(g);
  return g;
}
petalRing(8, 1.78, 2.12, 0.18);
addLineTo(yantra, circlePts(2.2), true);
petalRing(16, 2.26, 2.55, 0.14);
addLineTo(yantra, circlePts(2.62), true);

// bhupura — the square earth-citadel, extruded into a shallow 3D wall with 4 gates
const bhupura = new THREE.Group();
yantra.add(bhupura);
function squareLoop(half, z){
  return [
    new THREE.Vector3(-half,-half,z), new THREE.Vector3(half,-half,z),
    new THREE.Vector3(half,half,z), new THREE.Vector3(-half,half,z),
  ];
}
[[3.05,0.12],[2.92,0.0],[3.05,-0.12]].forEach(([half,z]) => addLineTo(bhupura, squareLoop(half,z), true));
// vertical corner posts joining the wall layers
[[-3.05,-3.05],[3.05,-3.05],[3.05,3.05],[-3.05,3.05]].forEach(([x,y]) => {
  addLineTo(bhupura, [new THREE.Vector3(x,y,0.12), new THREE.Vector3(x,y,-0.12)]);
});
// T-gates on each side, stepped like temple gopuram thresholds
const gateW=1.0, gateD=0.62;
for (let k=0;k<4;k++){
  const g = new THREE.Group();
  [[gateW,gateD,0.1],[gateW*0.7,gateD*1.28,0.0],[gateW*0.4,gateD*1.52,-0.1]].forEach(([w,d,z])=>{
    addLineTo(g, [
      new THREE.Vector3(-w/2, 3.05, z), new THREE.Vector3(-w/2, 3.05+d, z),
      new THREE.Vector3(w/2, 3.05+d, z), new THREE.Vector3(w/2, 3.05, z),
    ]);
  });
  g.rotation.z = k*Math.PI/2;
  bhupura.add(g);
}

/* ============================================================
   BLACK HOLE ORB (garbha — the womb of the machine)
============================================================ */
const orbGroup = new THREE.Group();
coreGroup.add(orbGroup);

orbGroup.add(new THREE.Mesh(
  new THREE.SphereGeometry(0.52, 48, 48),
  new THREE.MeshBasicMaterial({ color:0x000000 })
));

const diskUniforms = {
  uTime:{value:0}, uSwirl:{value:current.swirl}, uColor:{value:new THREE.Color(current.color)}
};
const diskMat = new THREE.ShaderMaterial({
  uniforms:diskUniforms, transparent:true, depthWrite:false, side:THREE.DoubleSide, blending:THREE.AdditiveBlending,
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`
    varying vec2 vUv; uniform float uTime; uniform float uSwirl; uniform vec3 uColor;
    void main(){
      vec2 c = vUv-0.5; float dist=length(c)*2.0; float angle=atan(c.y,c.x);
      float swirl = sin(angle*6.0 - uTime*uSwirl + dist*10.0)*0.5+0.5;
      float ring = smoothstep(0.15,0.22,dist)*(1.0-smoothstep(0.55,0.9,dist));
      float facet = 0.8+0.2*cos(angle*3.0+uTime*0.15);
      float alpha = ring*(0.35+0.65*swirl)*facet;
      vec3 hot = mix(vec3(1.0), uColor, smoothstep(0.15,0.4,dist));
      gl_FragColor = vec4(hot, alpha);
    }`
});
const diskGeo = new THREE.PlaneGeometry(6,6);
const diskH = new THREE.Mesh(diskGeo, diskMat); diskH.rotation.x = Math.PI/2; orbGroup.add(diskH);
const diskV = new THREE.Mesh(diskGeo, diskMat); diskV.rotation.y = Math.PI/2; orbGroup.add(diskV);

const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
  map:softTex, color:current.color, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
}));
glowSprite.scale.set(5.5,5.5,1);
orbGroup.add(glowSprite);

/* ============================================================
   PHOENIX WINGS — layered plumage swept along a rising arc
   Three feather ranks (coverts / secondaries / primaries) on a
   curved spine, tips flared upward, ember gradient base→tip.
============================================================ */
const wingsGroup = new THREE.Group();
coreGroup.add(wingsGroup);
const featherMats = []; // for state color updates

function featherShape(len, width){
  const s = new THREE.Shape();
  s.moveTo(0,0);
  s.bezierCurveTo(width, len*0.25, width*0.85, len*0.7, 0, len);       // outer edge, fuller near base
  s.bezierCurveTo(-width*0.55, len*0.72, -width*0.6, len*0.3, 0, 0);   // inner edge, slimmer — gives a real quill silhouette
  return s;
}

function buildPhoenixWing(side){
  const wing = new THREE.Group();

  // spine of the wing: shoulder → sweep out → rise → flick up at the tip
  const spine = new THREE.CubicBezierCurve3(
    new THREE.Vector3(side*3.4, -0.4, 0),
    new THREE.Vector3(side*6.2, 0.6, -0.5),
    new THREE.Vector3(side*8.6, 2.6, -1.0),
    new THREE.Vector3(side*10.4, 5.4, -1.4)
  );

  // rank config: [feather count, length scale, width, z offset, droop]
  const ranks = [
    { n:14, len:1.1, w:0.16, z: 0.32, droop:0.55, op:0.5 },  // coverts (short, front layer)
    { n:16, len:2.1, w:0.2,  z: 0.0,  droop:0.8,  op:0.75 }, // secondaries
    { n:18, len:3.4, w:0.24, z:-0.34, droop:1.05, op:1.0 },  // primaries (long, back layer)
  ];

  ranks.forEach((rank, ri) => {
    for (let i=0;i<rank.n;i++){
      const t = i/(rank.n-1);
      const p = spine.getPoint(t);
      const len = rank.len * (0.55 + t*1.05) * (1 - 0.08*Math.sin(t*Math.PI)); // long at the tip
      const geo = new THREE.ExtrudeGeometry(featherShape(len, rank.w*(0.8+t*0.5)), { depth:0.035, bevelEnabled:false });
      const mat = new THREE.MeshStandardMaterial({
        color:0x120c06,
        emissive:current.color, emissiveIntensity:0.7 + t*1.3,   // tips burn hottest — phoenix ember gradient
        metalness:0.3, roughness:0.45,
        transparent:true, opacity:(0.3 + t*0.65)*rank.op
      });
      featherMats.push({ mat, heat:0.7 + t*1.3 });
      const f = new THREE.Mesh(geo, mat);
      f.position.set(p.x, p.y, p.z + rank.z);

      // feather points outward from the spine, drooping near the shoulder and flaring at the tip
      const outAngle = THREE.MathUtils.lerp(-rank.droop, 0.85, t);
      f.rotation.z = side>0 ? (-Math.PI/2 + outAngle) : (Math.PI/2 - outAngle);
      f.rotation.y = side * (0.18 - t*0.1);
      f.rotation.x = -0.12 + Math.sin(t*Math.PI)*0.1;
      f.userData.baseRotZ = f.rotation.z;
      f.userData.t = t;
      f.userData.side = side;
      wing.add(f);
    }
  });

  // luminous leading-edge line tracing the spine
  const spinePts = spine.getPoints(40);
  addLineTo(wing, spinePts, false, new THREE.LineBasicMaterial({ color:current.color, transparent:true, opacity:0.85 }));

  wing.userData.side = side;
  return wing;
}
const wingL = buildPhoenixWing(-1);
const wingR = buildPhoenixWing(1);
wingsGroup.add(wingL, wingR);

/* -- ember particles drifting up off the plumage -- */
const emberCount = 260;
const emberGeo = new THREE.BufferGeometry();
const emberPos = new Float32Array(emberCount*3);
const emberSeed = new Float32Array(emberCount);
for (let i=0;i<emberCount;i++){
  const side = i%2===0 ? 1 : -1;
  emberPos[i*3]   = side*(3.5+Math.random()*7);
  emberPos[i*3+1] = -0.5+Math.random()*6;
  emberPos[i*3+2] = (Math.random()-0.5)*1.6;
  emberSeed[i] = Math.random()*100;
}
emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPos,3));
const emberMat = new THREE.PointsMaterial({ size:0.16, map:softTex, color:current.color, transparent:true, opacity:0.8, depthWrite:false, blending:THREE.AdditiveBlending });
const embers = new THREE.Points(emberGeo, emberMat);
coreGroup.add(embers);

/* ============================================================
   GROUND MANDALA — tiered temple-platform rings
============================================================ */
const ringMats = [];
[[4.8,-4.2,0.3],[5.5,-4.35,0.22],[6.3,-4.5,0.15],[7.2,-4.65,0.1]].forEach(([r,y,op])=>{
  const mat = new THREE.LineBasicMaterial({ color:current.color, transparent:true, opacity:op });
  ringMats.push(mat);
  const ring = addLineTo(coreGroup, circlePts(r,90), true, mat);
  ring.rotation.x = Math.PI/2; ring.position.y = y;
});
// radial spokes like a dharma-chakra floor
{
  const mat = new THREE.LineBasicMaterial({ color:current.color, transparent:true, opacity:0.12 });
  ringMats.push(mat);
  for (let i=0;i<24;i++){
    const a = (i/24)*Math.PI*2;
    addLineTo(coreGroup, [
      new THREE.Vector3(Math.cos(a)*4.8, -4.2, Math.sin(a)*4.8),
      new THREE.Vector3(Math.cos(a)*7.2, -4.65, Math.sin(a)*7.2),
    ], false, mat);
  }
}

/* ============================================================
   CAMERA ORBIT + ZOOM
============================================================ */
let camTheta=0.5, camPhi=1.3, camRadius=20, dragging=false, lastX=0, lastY=0;
renderer.domElement.addEventListener('pointerdown', e=>{dragging=true;lastX=e.clientX;lastY=e.clientY;});
addEventListener('pointerup', ()=>dragging=false);
addEventListener('pointermove', e=>{
  if(!dragging)return;
  camTheta -= (e.clientX-lastX)*0.005;
  camPhi = Math.min(Math.max(camPhi-(e.clientY-lastY)*0.005, 0.25), Math.PI-0.25);
  lastX=e.clientX; lastY=e.clientY;
});
addEventListener('wheel', e=>{ camRadius=Math.min(Math.max(camRadius+e.deltaY*0.02, 9), 60); }, {passive:true});

/* ============================================================
   STATE BUTTONS
============================================================ */
document.querySelectorAll('#controls button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#controls button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    target = STATES[btn.dataset.state];
    document.getElementById('stateLabel').textContent = target.label;
  });
});

/* ============================================================
   ANIMATION LOOP
============================================================ */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const el = clock.getElapsedTime();

  // state easing
  current.color.lerp(new THREE.Color(target.color), 0.04);
  current.rot   += (target.rot   - current.rot)*0.05;
  current.swirl += (target.swirl - current.swirl)*0.05;
  current.wing  += (target.wing  - current.wing)*0.05;
  current.flap  += (target.flap  - current.flap)*0.05;

  // color propagation
  lineMat.color.copy(current.color);
  yantra.traverse(o=>{ if(o.material && o.material.isLineBasicMaterial) o.material.color.copy(current.color); });
  bhupura.traverse(o=>{ if(o.material) o.material.color.copy(current.color); });
  ringMats.forEach(m=>m.color.copy(current.color));
  emberMat.color.copy(current.color);
  glowSprite.material.color.copy(current.color);
  coreLight.color.copy(current.color);
  featherMats.forEach(({mat,heat})=>{ mat.emissive.copy(current.color); mat.emissiveIntensity = heat*(0.85+0.15*Math.sin(el*2)); });
  wingsGroup.traverse(o=>{ if(o.material && o.material.isLineBasicMaterial) o.material.color.copy(current.color); });

  diskUniforms.uTime.value = el;
  diskUniforms.uSwirl.value = current.swirl;
  diskUniforms.uColor.value.copy(current.color);

  // core rotation + orb pulse
  coreGroup.rotation.y += current.rot;
  const pulse = target.pulse ? 1+0.06*Math.sin(el*6) : 1;
  orbGroup.scale.setScalar(pulse);
  coreLight.intensity = 1.8 + Math.sin(el*2.2)*0.5 + (target.pulse?Math.sin(el*6)*0.6:0);

  // gentle Meru breathing — the tiered yantra slowly expands and settles
  yantra.scale.setScalar(1 + 0.015*Math.sin(el*0.8));

  // phoenix wing flap: whole-wing beat plus per-feather ripple travelling to the tips
  const beat = Math.sin(el*1.4)*0.08*current.flap;
  wingL.rotation.z =  beat; wingR.rotation.z = -beat;
  [wingL, wingR].forEach(w => w.children.forEach(f => {
    if (!f.isMesh || f.userData.baseRotZ===undefined) return;
    const ripple = Math.sin(el*2.2 - f.userData.t*2.4)*0.06*current.flap;
    f.rotation.z = f.userData.baseRotZ + f.userData.side*ripple;
  }));
  wingsGroup.scale.setScalar(current.wing);

  // embers rise, wobble, respawn
  const pa = emberGeo.attributes.position.array;
  for (let i=0;i<emberCount;i++){
    pa[i*3+1] += 0.008 + 0.004*Math.sin(emberSeed[i]);
    pa[i*3]   += Math.sin(el*1.5+emberSeed[i])*0.003;
    if (pa[i*3+1] > 7){ pa[i*3+1] = -0.5+Math.random()*2; }
  }
  emberGeo.attributes.position.needsUpdate = true;
  emberMat.opacity = 0.5 + 0.3*Math.sin(el*3);

  // slow drift of the heavens
  galaxy.rotation.z += 0.0004;
  nebulaGroup.rotation.y += 0.00012;

  if(!dragging) camTheta += 0.0012;
  camera.position.set(
    camRadius*Math.sin(camPhi)*Math.sin(camTheta),
    camRadius*Math.cos(camPhi),
    camRadius*Math.sin(camPhi)*Math.cos(camTheta)
  );
  camera.lookAt(0,0.5,0);
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
